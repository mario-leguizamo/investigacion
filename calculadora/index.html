 <script>

let chart;

function calculateStats(){

    const input = document.getElementById("dataInput").value;

    const data = input
      .split(",")
      .map(num => parseFloat(num.trim()))
      .filter(num => !isNaN(num));

    if(data.length === 0){
      alert("Ingresa datos válidos.");
      return;
    }

    // =========================
    // ESTADÍSTICAS
    // =========================

    const mean = data.reduce((a,b)=>a+b,0)/data.length;

    const sorted = [...data].sort((a,b)=>a-b);

    let median;

    if(sorted.length % 2 === 0){
      median = (sorted[sorted.length/2 -1] + sorted[sorted.length/2])/2;
    }else{
      median = sorted[Math.floor(sorted.length/2)];
    }

    const freq = {};

    data.forEach(num=>{
      freq[num] = (freq[num] || 0) +1;
    });

    let mode = Object.keys(freq).reduce((a,b)=>
      freq[a] > freq[b] ? a : b
    );

    const variance = data.reduce((sum,num)=>
      sum + Math.pow(num - mean,2),0)/data.length;

    const std = Math.sqrt(variance);

    // =========================
    // MOSTRAR RESULTADOS
    // =========================

    document.getElementById("mean").innerText = mean.toFixed(2);
    document.getElementById("median").innerText = median;
    document.getElementById("mode").innerText = mode;
    document.getElementById("std").innerText = std.toFixed(2);

    // =========================
    // DESTRUIR GRÁFICO ANTERIOR
    // =========================

    if(chart){
      chart.destroy();
    }

    // =========================
    // GRÁFICO ESTILO GGPLOT2
    // =========================

    const ctx = document.getElementById('myChart');

    chart = new Chart(ctx, {

      type:'bar',

      data:{
        labels:data.map((_,i)=>`Obs ${i+1}`),

        datasets:[{
          label:'Distribución de datos',

          data:data,

          backgroundColor:'rgba(54, 162, 235, 0.75)',

          borderColor:'rgba(54, 162, 235, 1)',

          borderWidth:1.5,

          borderRadius:4,

          hoverBackgroundColor:'rgba(54, 162, 235, 0.9)'
        }]
      },

      options:{

        responsive:true,

        maintainAspectRatio:false,

        animation:{
          duration:1200
        },

        plugins:{

          legend:{
            display:true,

            labels:{
              color:'#222',
              font:{
                family:'Arial',
                size:14
              }
            }
          },

          title:{
            display:true,
            text:'Visualización Estadística',
            color:'#222',
            font:{
              size:20,
              family:'Arial'
            },
            padding:{
              top:10,
              bottom:25
            }
          }

        },

        scales:{

          x:{

            grid:{
              display:false
            },

            ticks:{
              color:'#444',
              font:{
                size:12
              }
            }
          },

          y:{

            beginAtZero:true,

            grid:{
              color:'rgba(0,0,0,0.08)'
            },

            ticks:{
              color:'#444'
            }
          }

        }

      }

    });

}

function downloadChart(){

    const canvas = document.getElementById("myChart");

    // Alta resolución
    const link = document.createElement('a');

    link.download = 'grafico_ggplot_estilo.png';

    link.href = canvas.toDataURL('image/png', 1.0);

    link.click();
}

</script>
